services:
  - type: web
    name: youtube-dl-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps --max-old-space-size=400 artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: MONGODB_URI
        sync: false
